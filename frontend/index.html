<!DOCTYPE html>
<html>
<head>
    <title>Mini Deployment Platform</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-align: center;
        }

        .container {
            margin-top: 60px;
        }

        .card {
            background: white;
            color: black;
            padding: 30px;
            border-radius: 12px;
            width: 550px;
            margin: auto;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
        }

        input {
            width: 90%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-top: 10px;
        }

        button {
            margin-top: 20px;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            background: #667eea;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #5a67d8;
        }

        .status {
            margin-top: 15px;
        }

        .spinner {
            margin: 15px auto;
            width: 40px;
            height: 40px;
            border: 5px solid #ccc;
            border-top: 5px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .logs {
            margin-top: 20px;
            text-align: left;
            background: #111;
            color: #0f0;
            padding: 15px;
            border-radius: 8px;
            height: 150px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 13px;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Mini Deployment Platform</h1>

    <div class="card">
        <h3>Deploy Your GitHub Project</h3>

        <input 
            type="text" 
            id="repoInput" 
            placeholder="Enter GitHub Repo URL"
        />

        <!-- ✅ FIXED BUTTON -->
        <button onclick="deployRepo()">Deploy</button>

        <div id="spinner" style="display:none;" class="spinner"></div>

        <div id="status" class="status"></div>

        <div id="logs" class="logs"></div>
    </div>
</div>

<script>
async function deployRepo() {
    const repoUrl = document.getElementById("repoInput").value;

    if (!repoUrl) {
        alert("Enter a repo URL");
        return;
    }

    const status = document.getElementById("status");
    const spinner = document.getElementById("spinner");
    const logs = document.getElementById("logs");

    // reset UI
    status.innerText = "Starting deployment...";
    spinner.style.display = "block";
    logs.innerText = "";

    try {
        const res = await fetch("http://127.0.0.1:8000/deploy", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ repo_url: repoUrl })
        });

        const data = await res.json();

        status.innerHTML = `
            ${data.status}<br>
            <a href="${data.url}" target="_blank">${data.url}</a>
        `;

    } catch (err) {
        status.innerText = "❌ Deployment failed!";
    }

    spinner.style.display = "none";
}

// 🔥 LIVE LOG FETCHER
async function fetchLogs() {
    try {
        const res = await fetch("http://127.0.0.1:8000/logs");
        const data = await res.json();

        document.getElementById("logs").innerText =
            (data.logs || []).join("\n");

    } catch (e) {
        // ignore errors
    }
}

// 🔁 refresh logs every 2 sec
setInterval(fetchLogs, 2000);
</script>

</body>
</html>
